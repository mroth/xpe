name: test
on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.go }} test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go: ["oldstable", "stable"]
        os: [macos-14, macos-15, macos-15-intel, macos-26, macos-26-intel, windows-latest] # https://github.com/actions/runner-images
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: Unit tests
        run: go test -v
      - name: Run cmd
        run: go run ./cmd
